name: Automated Production Release

on:
  push:
    tags:
      - 'v*' # Trigger on any version tag (e.g. v1.0.0, v1.0.1)

jobs:
  release:
    name: Build & Package Windows Installer
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm install --ignore-scripts

      - name: Build and Publish Electron Installer
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
